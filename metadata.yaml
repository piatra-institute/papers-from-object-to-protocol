abstract: |-
  Across the long history of art the locus of the work has migrated, in successive episodes, from the finished object toward the rule-bound specification. The intuition that an artwork is a singular artifact is a late and historically specific configuration; older regimes treated images as ritual instruments, dynastic technologies, devotional interfaces, and workshop products. Conceptual and score-based art relocated the work into the certificate, the score, the instruction. Generative code art added editioned variability through deterministic seeds. A third, still emerging migration extends the same logic to model-mediated work, where the artwork resides in an executable package of prompts, reference assets, model recommendations, seeds, and licenses, navigated by a user and realized by a model. We name this form latent score art and are explicit about its evidential status: the first two migrations rest on a deep inventory of conserved works, while the third is grounded in a small number of real, externally verifiable instances (the trained-model and protocol works of Holly Herndon and Mat Dryhurst, and the autonomous system Botto) in which the generative system rather than any single output is the exhibited work, alongside in-development and illustrative cases. We present it as an emerging category and an extrapolation of the protocol logic rather than a settled phenomenon, formalize a protocol as a substrate-relative, bounded, transferable, editioned, governed specification, and trace the consequences for legal authorship, market structure, and aesthetic ontology.
